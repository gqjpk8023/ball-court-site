<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>学员自由组班</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="组班概览">
        <div>
          <p class="eyebrow">两两一班 · 自由报名</p>
          <h1>学员组班管理</h1>
        </div>
        <div class="summary-grid" aria-label="统计">
          <div>
            <span id="studentCount">0</span>
            <small>学员</small>
          </div>
          <div>
            <span id="classCount">0</span>
            <small>已成班</small>
          </div>
          <div>
            <span id="waitingCount">0</span>
            <small>等待配对</small>
          </div>
        </div>
      </section>

      <section class="workspace">
        <aside class="panel controls-panel" aria-label="操作区">
          <section class="admin-box" aria-label="管理员登录">
            <div class="panel-header">
              <h2>管理员区</h2>
              <button class="icon-button" id="adminLogout" type="button" title="退出管理员" aria-label="退出管理员" hidden>
                <span aria-hidden="true">↪</span>
              </button>
            </div>

            <form id="passwordSetupForm" class="stacked-form" hidden>
              <p class="hint strong-hint">首次使用，请先设置管理员密码。以后只有输入密码才能修改上课时间。</p>
              <label>
                <span>设置密码</span>
                <input id="newAdminPassword" type="password" minlength="4" autocomplete="new-password" required>
              </label>
              <button class="primary-button" type="submit">保存密码</button>
            </form>

            <form id="adminLoginForm" class="stacked-form" hidden>
              <label>
                <span>管理员密码</span>
                <input id="adminPassword" type="password" autocomplete="current-password" required>
              </label>
              <button class="primary-button" type="submit">进入管理</button>
              <p id="adminMessage" class="form-message" role="status"></p>
            </form>
          </section>

          <section id="adminTools" hidden>
            <div class="divider"></div>
            <div class="panel-header">
              <h2>上课时间</h2>
              <button class="icon-button" id="resetDemo" type="button" title="恢复示例数据" aria-label="恢复示例数据">
                <span aria-hidden="true">↺</span>
              </button>
            </div>

            <form id="slotForm" class="stacked-form">
              <label>
                <span>课程名称</span>
                <input id="slotName" type="text" placeholder="例如：周末口语班" required>
              </label>
              <div class="form-row">
                <label>
                  <span>星期</span>
                  <select id="slotDay" required>
                    <option value="周一">周一</option>
                    <option value="周二">周二</option>
                    <option value="周三">周三</option>
                    <option value="周四">周四</option>
                    <option value="周五">周五</option>
                    <option value="周六" selected>周六</option>
                    <option value="周日">周日</option>
                  </select>
                </label>
                <label>
                  <span>时间</span>
                  <input id="slotTime" type="time" value="10:00" required>
                </label>
              </div>
              <label>
                <span>备注</span>
                <input id="slotNote" type="text" placeholder="例如：适合基础学员">
              </label>
              <div class="button-row">
                <button class="primary-button" id="slotSubmit" type="submit">添加时间段</button>
                <button class="secondary-button" id="cancelSlotEdit" type="button" hidden>取消编辑</button>
              </div>
            </form>

            <form id="changePasswordForm" class="stacked-form slim-form">
              <label>
                <span>修改管理员密码</span>
                <input id="changeAdminPassword" type="password" minlength="4" autocomplete="new-password" placeholder="输入新密码" required>
              </label>
              <button class="secondary-button" type="submit">更新密码</button>
              <p id="passwordChangeMessage" class="form-message success-message" role="status"></p>
            </form>
          </section>

          <div class="divider"></div>

          <form id="studentForm" class="stacked-form">
            <h2>学员报名</h2>
            <label>
              <span>学员姓名</span>
              <input id="studentName" type="text" placeholder="输入姓名" required>
            </label>
            <label>
              <span>选择上课时间</span>
              <select id="studentSlot" required></select>
            </label>
            <button class="primary-button" type="submit">加入组班</button>
          </form>

          <p class="hint">每个时间段自动按报名顺序两人成班。只有 1 人时会显示在等待配对里。</p>
        </aside>

        <section class="main-panel" aria-label="组班结果">
          <div class="section-heading">
            <div>
              <h2>当前组班</h2>
              <p>学员可自由报名；修改时间和删除名单需要管理员密码。</p>
            </div>
            <button id="exportData" class="secondary-button" type="button">导出名单</button>
          </div>
          <div id="slotList" class="slot-list"></div>
        </section>
      </section>
    </main>

    <dialog id="exportDialog">
      <form method="dialog">
        <div class="dialog-header">
          <h2>导出名单</h2>
          <button class="icon-button" value="close" aria-label="关闭" title="关闭">×</button>
        </div>
        <textarea id="exportText" readonly></textarea>
        <button class="primary-button" value="close">完成</button>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
